<VirtualHost *:80>
    DocumentRoot /var/www/html/public
    DirectoryIndex webhook.php index.php

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Security headers
    Header always set X-Frame-Options DENY
    Header always set X-Content-Type-Options nosniff
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy no-referrer
    Header always unset X-Powered-By

    # Block access to config and state
    <DirectoryMatch "^/var/www/html/(config|state|logs|migrations|src|vendor)">
        Require all denied
    </DirectoryMatch>

    ErrorLog /var/www/html/logs/apache_error.log
    CustomLog /var/www/html/logs/apache_access.log combined
</VirtualHost>
